<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Agent</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div>
          <h1>Local Agent</h1>
          <p class="subtitle">Qwen llamafile + Any-Agent + MCPD tools</p>
        </div>
        <div id="health" class="health">Checking services...</div>
      </header>

      <main class="layout">
        <section class="panel chat-panel">
          <div id="messages" class="messages"></div>
          <form id="chat-form" class="chat-form">
            <textarea
              id="query"
              rows="3"
              placeholder="Ask anything... e.g. What time is it in Tokyo?"
              required
            ></textarea>
            <button type="submit" id="send-btn">Send</button>
          </form>
        </section>

        <aside class="panel tools-panel">
          <div class="tools-header">
            <h2>Tools</h2>
            <button id="refresh-tools" type="button">Refresh</button>
          </div>
          <div id="tools-list" class="tools-list"></div>

          <div class="add-tool">
            <h3>Add MCPD Tool</h3>
            <select id="mcpd-tool-select"></select>
            <button id="add-mcpd-tool" type="button">Add</button>
          </div>

          <div class="add-tool">
            <h3>Add Local Tool</h3>
            <select id="local-tool-select"></select>
            <button id="add-local-tool" type="button">Add</button>
          </div>
        </aside>
      </main>
    </div>

    <script src="/assets/app.js"></script>
  </body>
</html>
